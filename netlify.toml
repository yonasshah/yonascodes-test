# netlify.toml

# Build settings
[build]
  # This command builds the React app and then uses your custom script 
  # to move the files into the correct place for the main site.
  command = "cd portal && npm install && npm run build"
  # The directory containing your static index.html and the new portal/ folder
  publish = "public"
  functions = "netlify/functions"

# Redirect rules
[[redirects]]
  # This ensures React Router handles all sub-pages within the portal
  from = "/portal/*"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  # API proxy for Netlify Functions
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
  port = 8888          
  publish = "public"   
  targetPort = 3000    
  framework = "#custom"